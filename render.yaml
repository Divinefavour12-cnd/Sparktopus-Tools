services:
  - type: web
    name: sparktopus-web
    env: docker
    plan: free # Change to starter if you need more resources
    region: ohio # Change to your preferred region
    healthCheckPath: /
    envVars:
      - key: APP_ENV
        value: production
      - key: LOG_CHANNEL
        value: stderr
      - key: APP_DEBUG
        value: "true" # Temporarily enable for debugging
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        fromContext: RENDER_EXTERNAL_URL
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        fromDatabase:
          name: sparktopus-db
          property: connectionString
      - key: DB_PORT
        fromDatabase:
          name: sparktopus-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: sparktopus-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: sparktopus-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: sparktopus-db
          property: password

databases:
  - name: sparktopus-db
    plan: free # Note: Free databases are deleted after 90 days. Upgrade if needed.
    databaseName: sparktopus
    user: sparktopus_user
    region: ohio
